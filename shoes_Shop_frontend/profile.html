<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trang cá nhân - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <h4 class="card-title">Thông tin tài khoản</h4>
            <p id="profile-username">Tên: -</p>
            <div id="admin-actions" class="mb-2 d-none">
              <a href="admin/manage-product.html" class="btn btn-sm btn-info me-1">Quản lí hàng hóa</a>
              <a href="#" id="manage-accounts" class="btn btn-sm btn-outline-secondary me-1">Quản lí tài khoản</a>
            </div>
            <button id="profile-logout" class="btn btn-outline-secondary">Đăng xuất</button>
            <a href="index.html" class="btn btn-primary ms-2">Về trang chủ</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function(){
      function $(sel){return document.querySelector(sel)}
      try{
        var cur = JSON.parse(localStorage.getItem('currentUser')||'null')
        if(cur && cur.username){
          $('#profile-username').textContent = 'Tên: ' + cur.username
          if(cur.role && cur.role === 'admin'){
            document.getElementById('admin-actions').classList.remove('d-none')
          }
        } else {
          window.location.href = 'auth.html'
        }
      }catch(e){window.location.href='auth.html'}

      var btn = $('#profile-logout')
      if(btn) btn.addEventListener('click', function(){localStorage.removeItem('currentUser'); window.location.href='index.html'})
    })()
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý hàng hóa - myshoes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Quản lý hàng hóa</h3>
      <a href="../index.html" class="btn btn-secondary">Về trang chủ</a>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="card-title">Thêm / Sửa sản phẩm</h5>
            <form id="product-form">
              <input type="hidden" id="prod-id">
              <div class="mb-2">
                <label class="form-label">Tên</label>
                <input id="prod-name" class="form-control" required>
              </div>
              <div class="mb-2">
                <label class="form-label">Hãng</label>
                <select id="prod-brand" class="form-control">
                  <option value="">-- Chọn hãng --</option>
                </select>
              </div>
              <div class="mb-2">
                <label class="form-label">Mô tả</label>
                <textarea id="prod-desc" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-2">
                <label class="form-label">Mô tả chi tiết</label>
                <textarea id="prod-detail" class="form-control" rows="4" placeholder="Mô tả chi tiết, vật liệu, ghi chú..."></textarea>
              </div>
              <div class="mb-2">
                <label class="form-label">Ảnh sản phẩm (thumbnail)</label>
                <input id="prod-image" type="file" accept="image/*" class="form-control">
                <div id="prod-image-preview" class="mt-2"></div>
              </div>
              <div class="mb-2">
                <label class="form-label">Ảnh chi tiết (mở khi bấm)</label>
                <input id="prod-detail-image" type="file" accept="image/*" class="form-control">
                <div id="prod-detail-image-preview" class="mt-2"></div>
              </div>
              <div class="mb-2">
                <label class="form-label">Số lượng trong kho (mỗi cỡ)</label>
                <div class="row">
                  <div class="col-4 col-sm-2 mb-1"><label>39</label><input id="qty-39" type="number" min="0" class="form-control"></div>
                  <div class="col-4 col-sm-2 mb-1"><label>40</label><input id="qty-40" type="number" min="0" class="form-control"></div>
                  <div class="col-4 col-sm-2 mb-1"><label>41</label><input id="qty-41" type="number" min="0" class="form-control"></div>
                  <div class="col-4 col-sm-2 mb-1"><label>42</label><input id="qty-42" type="number" min="0" class="form-control"></div>
                  <div class="col-4 col-sm-2 mb-1"><label>43</label><input id="qty-43" type="number" min="0" class="form-control"></div>
                  <div class="col-4 col-sm-2 mb-1"><label>44</label><input id="qty-44" type="number" min="0" class="form-control"></div>
                </div>
              </div>
              <div class="mb-2">
                <label class="form-label">Giá (VND)</label>
                <input id="prod-price" type="number" class="form-control" required>
              </div>
              <div class="mb-2">
                <label class="form-label">Giảm giá (%)</label>
                <input id="prod-discount" type="number" min="0" max="100" class="form-control" placeholder="Ví dụ: 10 cho 10%">
              </div>
              
              <div>
                <button class="btn btn-primary" id="save-btn">Lưu</button>
                <button class="btn btn-secondary" id="reset-btn" type="button">Tạo mới</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Danh sách sản phẩm</h5>
            <div id="admin-product-list" class="list-group"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin-manage-product.js"></script>
</body>
</html>

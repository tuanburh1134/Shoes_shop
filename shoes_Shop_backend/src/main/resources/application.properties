# ==============================================================================
# DATASOURCE - MySQL (shop_shoes)
# ==============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/shop_shoes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=NewStrongPass!123
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / HIBERNATE Configuration
# 'update' is convenient for development; change to 'validate'/'none' in production.
spring.jpa.hibernate.ddl-auto=update

# Show SQL query in console (Optional - useful for debugging JPA)
spring.jpa.show-sql=true
# Format the SQL for better readability (Optional)
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console when using MySQL
spring.h2.console.enabled=false

# Server port (default 8080)
server.port=8080

# LOGGING Levels
logging.level.org.springframework=INFO
logging.level.com.shoes.ecommerce=DEBUG


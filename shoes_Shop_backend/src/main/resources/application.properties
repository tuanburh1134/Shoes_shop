

# Datasource - MySQL (use your MySQL Shoes database)
spring.datasource.url=jdbc:mysql://localhost:3306/shoes?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=NewStrongPass!123

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# (Disable H2 console by default when using MySQL)
spring.h2.console.enabled=false

# Logging
logging.level.org.springframework=INFO
logging.level.com.shoes.ecommerce=DEBUG

# Gemini API key (ưu tiên biến môi trường GOOGLE_API_KEY hoặc gemini.api.key)
gemini.api.key=AIzaSyDR2xhkTA7lql7EY_9m3X5U39qv01_9Gdc
# Model mặc định ổn định (v1beta): ví dụ gemini-1.5-flash, gemini-1.5-pro. Nếu dùng 3.1 preview, cần chính xác ID trong AI Studio.
gemini.api.model=gemini-1.5-flash
# ==============================================================================
# DATASOURCE - Local development default (H2 file-based) - keeps data across restarts
# To use MySQL instead, replace the datasource url/driver/credentials below or
# set spring.profiles.active to a profile that provides MySQL configuration.
# ==============================================================================
# H2 file-based DB (data stored in ~/.shoes/shoes.mv.db)
spring.datasource.url=jdbc:h2:file:${user.home}/.shoes/shoes;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# If you prefer MySQL, uncomment and adjust these values (example):
# spring.datasource.url=jdbc:mysql://localhost:3306/shoes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=YourPasswordHere

# JPA / HIBERNATE Configuration
# 'update' is convenient for development; change to 'validate'/'none' in production.
spring.jpa.hibernate.ddl-auto=update

# Show SQL query in console (Optional - useful for debugging JPA)
spring.jpa.show-sql=true
# Format the SQL for better readability (Optional)
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 console for local debugging (accessible at /h2-console)
spring.h2.console.enabled=true

# Server port (default 8080)
server.port=8080

# LOGGING Levels
logging.level.org.springframework=INFO
logging.level.com.shoes.ecommerce=DEBUG

# Google OAuth2 Web Client ID (required for /api/auth/google)
# Example: 1234567890-xxxxx.apps.googleusercontent.com
google.oauth.client-id=213568517226-ac26ekl9ngmsh2agc1i3qmtspnajd78c.apps.googleusercontent.com